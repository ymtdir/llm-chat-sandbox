version: '3.9'

services:
  # PostgreSQL 17データベース
  postgres:
    image: postgres:17-alpine
    container_name: ai_diary_companion_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_diary_companion
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_diary_network

  # FastAPIアプリケーション
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_diary_companion_app
    environment:
      # データベース接続設定
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ai_diary_companion
      ASYNC_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ai_diary_companion
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ai_diary_companion_test

      # アプリケーション設定
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here-change-in-production}
      GROQ_API_KEY: ${GROQ_API_KEY:-your-groq-api-key-here}
      ENVIRONMENT: development
      DEBUG: 'true'
      LOG_LEVEL: INFO
    volumes:
      # ホットリロード用にソースコードをマウント
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./.env:/app/.env:ro
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai_diary_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Alembicマイグレーション実行用（開発時のみ）
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_diary_companion_migrate
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ai_diary_companion
    volumes:
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai_diary_network
    command: alembic upgrade head
    profiles:
      - migrate

networks:
  ai_diary_network:
    driver: bridge

volumes:
  postgres_data:
    name: ai_diary_companion_postgres_data

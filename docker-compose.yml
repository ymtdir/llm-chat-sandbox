version: '3.9'

services:
  # PostgreSQL 17データベース
  postgres:
    image: postgres:17-alpine
    container_name: ai_diary_companion_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ai_diary_companion}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_diary_network

  # pgAdmin - DBの管理UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ai_diary_companion_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai_diary_network

networks:
  ai_diary_network:
    driver: bridge

volumes:
  postgres_data:
    name: ai_diary_companion_postgres_data
